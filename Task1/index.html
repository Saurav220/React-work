<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Status Badge Demo</title>
    <link rel="stylesheet" href="./StatusBadge.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #111827;
      }

      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const STATUS_CLASSES = {
        pending: "status-badge--pending",
        "in-progress": "status-badge--in-progress",
        completed: "status-badge--completed",
        failed: "status-badge--failed",
        "on-hold": "status-badge--on-hold",
      };

      function formatStatus(status = "") {
        return status
          .split("-")
          .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
          .join(" ");
      }

      function StatusBadge({ status }) {
        const badgeClass = STATUS_CLASSES[status] || "status-badge--default";

        return (
          <span className={`status-badge ${badgeClass}`}>
            {formatStatus(status || "unknown")}
          </span>
        );
      }

      function App() {
        const statuses = [
          "pending",
          "in-progress",
          "completed",
          "failed",
          "on-hold",
        ];

        return (
          <div style={{ padding: "24px" }}>
            <h1>Status Badge Demo</h1>

            <div
              style={{
                display: "flex",
                gap: "12px",
                flexWrap: "wrap",
                marginTop: "16px",
              }}
            >
              {statuses.map((status) => (
                <StatusBadge key={status} status={status} />
              ))}
            </div>

            <h2 style={{ marginTop: "24px" }}>Unknown Status</h2>
            <StatusBadge status="archived" />
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
